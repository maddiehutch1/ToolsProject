<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innerly — Your Mental Wellness Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="app-header">
    <div id="header-brand">
      <svg id="logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="18" cy="18" r="18" fill="#dbeafe"/>
        <!-- leaf / inner calm mark -->
        <path d="M18 8 C10 12 10 24 18 28 C26 24 26 12 18 8Z" fill="#93c5fd" opacity="0.7"/>
        <path d="M18 8 C18 8 18 28 18 28" stroke="#3b82f6" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="2.2" fill="#3b82f6"/>
      </svg>
      <div id="header-text">
        <span id="app-name">Innerly</span>
        <span id="app-tagline">Your mental wellness companion</span>
      </div>
    </div>
  </header>

  <div id="disclaimer">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" width="14" height="14" style="flex-shrink:0;margin-top:1px">
      <circle cx="8" cy="8" r="7.25" stroke="#60a5fa" stroke-width="1.5"/>
      <path d="M8 7v4" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="8" cy="5" r="0.75" fill="#60a5fa"/>
    </svg>
    This tool is not a substitute for professional mental health care. If you are in crisis, please call or text 988.
  </div>

  <div id="chat-container">
    <div id="messages"></div>
  </div>

  <div id="input-area">
    <div id="input-inner">
      <input id="user-input" type="text" placeholder="How are you feeling today?" autocomplete="off" />
      <button id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
          <path d="M2.94 2.06a.75.75 0 0 1 .82-.17l14 6a.75.75 0 0 1 0 1.38l-14 6A.75.75 0 0 1 2.75 14l2.2-4H10a.75.75 0 0 0 0-1.5H4.95L2.75 4.5a.75.75 0 0 1 .19-2.44Z"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
